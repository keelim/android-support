name: Manual Version Bump PR

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-1.3.14-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-1.3.14-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Calculate new version
        id: version
        run: |
          NEW_VERSION=$(node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const buildType = process.env.BUILD_TYPE;
            const match = /^([0-9]+)\.([0-9]+)\.([0-9]+)$/.exec(pkg.version);
            if (!match) throw new Error('package.json version must be x.y.z');
            const next = match.slice(1).map(Number);
            if (buildType === 'major') {
              next[0] += 1;
              next[1] = 0;
              next[2] = 0;
            } else if (buildType === 'minor') {
              next[1] += 1;
              next[2] = 0;
            } else if (buildType === 'patch') {
              next[2] += 1;
            } else {
              throw new Error('Unsupported build_type: ' + buildType);
            }
            process.stdout.write(next.join('.'));
          ")
          echo "NEW_VERSION=$NEW_VERSION" >> "$GITHUB_ENV"
        env:
          BUILD_TYPE: ${{ github.event.inputs.build_type }}

      - name: Update package.json version
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = process.env.NEW_VERSION;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Check action contract drift
        run: bun run check:contract

      - name: Check workflow release gates
        run: bun run check:ci-release

      - name: Typecheck
        run: bun run typecheck

      - name: Run tests
        run: bun run test

      - name: Run tests with coverage
        run: bun run test:coverage

      - name: Build action bundle
        run: bun run build

      - name: Verify committed action bundle is fresh
        run: git diff --exit-code -- lib/index.js

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: bump version to ${{ env.NEW_VERSION }}'
          title: 'chore: bump version to ${{ env.NEW_VERSION }}'
          body: |
            자동으로 생성된 PR입니다.
            - 버전 업데이트: ${{ env.NEW_VERSION }}
            - lib/index.js 빌드 완료
            - 테스트/커버리지/typecheck/계약 drift 검증 완료
            - main merge 후 Release workflow가 v${{ env.NEW_VERSION }} 태그와 GitHub Release를 생성합니다.
          branch: version-bump/${{ env.NEW_VERSION }}
          base: main
          labels: |
            automated pr
            version bump
          add-paths: |
            package.json
            lib/index.js
