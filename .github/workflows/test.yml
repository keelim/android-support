name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-1.3.14-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-1.3.14-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check action contract drift
        run: bun run check:contract

      - name: Check workflow release gates
        run: bun run check:ci-release

      - name: Typecheck
        run: bun run typecheck

      - name: Run tests
        run: bun run test

      - name: Run tests with coverage and JUnit
        run: |
          JEST_JUNIT_CLASSNAME="{filepath}" bun run test:coverage -- --reporters=default --reporters=jest-junit

      - name: Build action bundle
        run: bun run build

      - name: Verify committed action bundle is fresh
        run: git diff --exit-code -- lib/index.js

      - name: Upload test artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            junit.xml
            coverage/
          if-no-files-found: warn

      - name: Upload test results to Codecov
        if: ${{ !cancelled() && env.CODECOV_TOKEN != '' }}
        uses: codecov/test-results-action@v1
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          token: ${{ env.CODECOV_TOKEN }}

      - name: Upload coverage reports to Codecov
        if: ${{ !cancelled() && env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          token: ${{ env.CODECOV_TOKEN }}
          slug: keelim/android-support
