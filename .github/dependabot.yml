version: 2
updates:
  - package-ecosystem: 'bun' # 또는 bun
    directory: '/' # 프로젝트의 루트 디렉토리
    schedule:
      interval: 'daily' # 매일 종속성 업데이트 확인
    target-branch: 'main'
    labels:
      - 'dependencies'
      - 'dependabot'
    commit-message:
      prefix: 'deps'
      include: 'scope'
    open-pull-requests-limit: 5
    groups:
      runtime-dependencies:
        dependency-type: 'production'
      development-dependencies:
        dependency-type: 'development'
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'daily'
    target-branch: 'main'
    labels:
      - 'dependencies'
      - 'github-actions'
      - 'dependabot'
    commit-message:
      prefix: 'deps'
      include: 'scope'
    open-pull-requests-limit: 5
